<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — SDGs Storytelling Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a2b5e 0%,#0f3460 60%,#16213e 100%);padding:20px;position:relative;overflow:hidden;}
    .login-wrapper::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:rgba(200,146,42,0.1);}
    .login-wrapper::after{content:'';position:absolute;bottom:-80px;left:10%;width:300px;height:300px;border-radius:50%;background:rgba(13,122,110,0.12);}
    .login-card{background:white;border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative;z-index:1;}
    .login-logo{text-align:center;margin-bottom:28px;}
    .login-logo .emoji{font-size:48px;margin-bottom:12px;display:block;}
    .login-logo h1{font-family:'Prompt',sans-serif;font-size:22px;font-weight:800;color:var(--kku-navy);margin-bottom:4px;}
    .login-logo p{font-size:13px;color:var(--kku-gray);}
    .login-field{margin-bottom:18px;}
    .login-field label{font-size:12px;font-weight:700;color:var(--kku-navy);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
    .login-field input{width:100%;padding:12px 16px;border:1.5px solid var(--kku-border);border-radius:10px;font-family:'Sarabun',sans-serif;font-size:15px;outline:none;transition:all 0.2s;}
    .login-field input:focus{border-color:var(--kku-teal);box-shadow:0 0 0 3px rgba(13,122,110,0.1);}
    .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--kku-teal),#0a5c52);color:white;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;}
    .login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,122,110,0.4);}
    .login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
    .login-error{background:#fff5f5;border:1px solid #ffd7d7;color:#e74c3c;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;text-align:center;}
    .login-error.show{display:block;}
    .login-footer{text-align:center;margin-top:20px;font-size:11px;color:var(--kku-gray);}
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <span class="emoji">🌍</span>
      <h1>SDGs Storytelling Journey</h1>
      <p>เข้าสู่ระบบเพื่อจัดการโครงการ SDGs ของคณะ</p>
    </div>
    <div class="login-error" id="loginError"></div>
    <div class="login-field">
      <label>👤 Username</label>
      <input type="text" id="username" placeholder="กรอก Username" autocomplete="username">
    </div>
    <div class="login-field">
      <label>🔒 Password</label>
      <input type="password" id="password" placeholder="กรอก Password" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <a href="demo.html" style="display:block;text-align:center;margin-top:14px;padding:12px;border:1.5px solid var(--kku-border);border-radius:10px;color:var(--kku-gray);font-size:13px;font-weight:600;text-decoration:none;transition:all 0.2s;font-family:'Sarabun',sans-serif;">🧪 ทดลองกรอกข้อมูล (ไม่บันทึก)</a>
    <div class="login-footer">มหาวิทยาลัยขอนแก่น — <a href="https://sdg.kku.ac.th" style="color:var(--kku-teal)">sdg.kku.ac.th</a></div>
  </div>
</div>
<script>
// ⚠️ ใส่ URL เดียวกับใน app-sdgs.js
const API_URL = 'https://script.google.com/macros/s/AKfycbz3GW1VJu64Km4n9rypJGkpVUV67hJTUNVjgd6P4mC_xLfkzTocqQq1fVTcHf-sWgGz/exec';

// Enter key = submit
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errDiv = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  errDiv.classList.remove('show');

  if (!username || !password) {
    errDiv.textContent = 'กรุณากรอก Username และ Password';
    errDiv.classList.add('show');
    return;
  }

  btn.textContent = '⏳ กำลังเข้าสู่ระบบ...';
  btn.disabled = true;

  try {
    const url = API_URL + '?action=login&username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password);
    const res = await fetch(url);
    const result = await res.json();

    if (result.status === 'success') {
      // Save session
      sessionStorage.setItem('sdg_user', JSON.stringify({
        username: result.username,
        faculty_name: result.faculty_name,
        role: result.role
      }));
      // Redirect to dashboard
      window.location.href = 'dashboard.html';
    } else {
      errDiv.textContent = result.message || 'เข้าสู่ระบบไม่สำเร็จ';
      errDiv.classList.add('show');
    }
  } catch (error) {
    errDiv.textContent = 'เกิดข้อผิดพลาด: ' + error.message;
    errDiv.classList.add('show');
  } finally {
    btn.textContent = 'เข้าสู่ระบบ';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
