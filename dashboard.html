<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — SDGs Storytelling Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .dash-header{background:linear-gradient(135deg,var(--kku-navy) 0%,#0f3460 100%);padding:20px 0;position:relative;overflow:hidden;}
    .dash-header::before{content:'';position:absolute;top:-40px;right:-60px;width:250px;height:250px;border-radius:50%;background:rgba(200,146,42,0.1);}
    .dash-header-inner{max-width:960px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
    .dash-header-left h1{font-family:'Prompt',sans-serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:2px;}
    .dash-header-left p{font-size:12px;color:rgba(255,255,255,0.6);}
    .dash-user{display:flex;align-items:center;gap:12px;}
    .dash-user-info{text-align:right;}
    .dash-user-name{font-size:13px;font-weight:700;color:#f0c76a;}
    .dash-user-role{font-size:10px;color:rgba(255,255,255,0.5);}
    .dash-logout{padding:8px 16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Sarabun',sans-serif;}
    .dash-logout:hover{background:rgba(231,76,60,0.8);border-color:transparent;}
    .dash-main{max-width:960px;margin:0 auto;padding:24px 20px 60px;}
    .dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
    .dash-stat{background:white;border-radius:14px;padding:18px;text-align:center;border:1px solid var(--kku-border);box-shadow:var(--shadow-sm);}
    .dash-stat .val{font-family:'Prompt',sans-serif;font-size:28px;font-weight:800;color:var(--kku-navy);}
    .dash-stat .lbl{font-size:11px;color:var(--kku-gray);margin-top:4px;}
    .dash-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
    .dash-toolbar h2{font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;color:var(--kku-navy);}
    .dash-add-btn{padding:10px 20px;background:linear-gradient(135deg,var(--kku-teal),#0a5c52);color:white;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s;box-shadow:0 4px 14px rgba(13,122,110,0.3);}
    .dash-add-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,122,110,0.4);}
    .project-list{display:flex;flex-direction:column;gap:12px;}
    .project-card{background:white;border-radius:14px;padding:20px;border:1px solid var(--kku-border);box-shadow:var(--shadow-sm);transition:all 0.2s;}
    .project-card:hover{box-shadow:var(--shadow-md);}
    .project-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
    .project-id{font-family:'Prompt',sans-serif;font-size:11px;font-weight:700;color:var(--kku-teal);background:rgba(13,122,110,0.08);padding:3px 10px;border-radius:20px;}
    .project-date{font-size:11px;color:var(--kku-gray);}
    .project-title{font-family:'Prompt',sans-serif;font-size:15px;font-weight:700;color:var(--kku-navy);margin-bottom:6px;}
    .project-meta{font-size:12px;color:var(--kku-gray);margin-bottom:10px;line-height:1.5;}
    .project-sdgs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
    .project-sdg-tag{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;color:white;}
    .project-actions{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--kku-border);}
    .project-actions button{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all 0.2s;border:1.5px solid;display:flex;align-items:center;gap:4px;}
    .btn-view{background:#f0f7ff;color:#2980b9;border-color:#d0e8f8;}
    .btn-view:hover{background:#2980b9;color:white;}
    .btn-edit{background:#f0faf7;color:var(--kku-teal);border-color:#b8e8de;}
    .btn-edit:hover{background:var(--kku-teal);color:white;}
    .btn-delete{background:#fff5f5;color:#e74c3c;border-color:#ffd7d7;}
    .btn-delete:hover{background:#e74c3c;color:white;}
    .empty-state{text-align:center;padding:60px 20px;color:var(--kku-gray);}
    .empty-state .emoji{font-size:48px;margin-bottom:12px;display:block;}
    .empty-state p{font-size:14px;}
    .loading{text-align:center;padding:40px;color:var(--kku-gray);font-size:14px;}

    /* ── SEARCH & FILTERS ── */
    .filter-panel{background:white;border-radius:14px;padding:18px;border:1px solid var(--kku-border);box-shadow:var(--shadow-sm);margin-bottom:16px;}
    .filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
    .filter-group{flex:1;min-width:180px;}
    .filter-group label{display:block;font-size:10px;font-weight:700;color:var(--kku-gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
    .filter-group input,.filter-group select{width:100%;padding:8px 12px;border:1.5px solid var(--kku-border);border-radius:8px;font-family:'Sarabun',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
    .filter-group input:focus,.filter-group select:focus{border-color:var(--kku-teal);}
    .filter-sdg-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
    .filter-sdg-btn{width:32px;height:32px;border-radius:6px;border:none;cursor:pointer;font-size:10px;font-weight:800;color:white;opacity:0.35;transition:all 0.15s;}
    .filter-sdg-btn:hover{opacity:0.7;transform:scale(1.1);}
    .filter-sdg-btn.active{opacity:1;box-shadow:0 2px 8px rgba(0,0,0,0.25);transform:scale(1.1);}
    .filter-reset{padding:8px 16px;background:var(--kku-light);border:1px solid var(--kku-border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;color:var(--kku-gray);transition:all 0.2s;align-self:flex-end;white-space:nowrap;}
    .filter-reset:hover{background:#fff5f5;color:#e74c3c;border-color:#ffd7d7;}
    .filter-count{font-size:12px;color:var(--kku-gray);margin-bottom:10px;padding:6px 0;}
    .filter-count strong{color:var(--kku-navy);}

    /* ── ADMIN PANELS ── */
    .admin-panels{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
    .admin-panel{background:white;border-radius:14px;padding:18px;border:1px solid var(--kku-border);box-shadow:var(--shadow-sm);}
    .admin-panel h3{font-family:'Prompt',sans-serif;font-size:14px;font-weight:700;color:var(--kku-navy);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
    .sdg-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;}
    .sdg-bar-label{width:28px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:white;flex-shrink:0;}
    .sdg-bar-track{flex:1;height:16px;background:#f0f3f8;border-radius:8px;overflow:hidden;}
    .sdg-bar-fill{height:100%;border-radius:8px;transition:width 0.5s;}
    .sdg-bar-count{font-weight:700;color:var(--kku-navy);width:28px;text-align:right;flex-shrink:0;}
    .faculty-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f3f8;font-size:12px;}
    .faculty-row:last-child{border:none;}
    .faculty-name{color:#333;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .faculty-count{font-family:'Prompt',sans-serif;font-weight:800;color:var(--kku-teal);font-size:14px;margin-left:8px;}
    .faculty-zero{color:#e74c3c !important;}

    /* Admin Log */
    .admin-log-btn{padding:10px 20px;background:linear-gradient(135deg,#8e44ad,#6c3483);color:white;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s;box-shadow:0 4px 14px rgba(142,68,173,0.3);}
    .admin-log-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(142,68,173,0.4);}
    .log-panel{display:none;background:white;border-radius:14px;padding:20px;border:1px solid var(--kku-border);box-shadow:var(--shadow-md);margin-bottom:20px;}
    .log-panel.show{display:block;}
    .log-panel h3{font-family:'Prompt',sans-serif;font-size:15px;font-weight:700;color:#8e44ad;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .log-table{width:100%;border-collapse:collapse;font-size:12px;}
    .log-table th{background:#f5f0fa;color:#8e44ad;padding:8px 10px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #e0d4f0;}
    .log-table td{padding:8px 10px;border-bottom:1px solid var(--kku-border);color:#333;}
    .log-table tr:hover td{background:#faf8fd;}
    .log-action{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;color:white;display:inline-block;}
    .log-action-view{background:#3498db;}.log-action-edit{background:#0d7a6e;}.log-action-save{background:#27ae60;}.log-action-delete{background:#e74c3c;}.log-action-new{background:#f39c12;}
    .log-close{padding:6px 14px;background:var(--kku-light);border:1px solid var(--kku-border);border-radius:8px;font-size:12px;cursor:pointer;font-family:'Sarabun',sans-serif;margin-top:12px;}

    @media(max-width:640px){
      .dash-stats{grid-template-columns:1fr;}
      .dash-toolbar{flex-direction:column;gap:12px;align-items:stretch;}
      .dash-header-inner{flex-direction:column;gap:12px;text-align:center;}
      .dash-user{flex-direction:column;}.dash-user-info{text-align:center;}
      .filter-row{flex-direction:column;}
      .filter-group{min-width:100%;}
      .admin-panels{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<div class="dash-header">
  <div class="dash-header-inner">
    <div class="dash-header-left">
      <h1>🌍 SDGs Storytelling Journey</h1>
      <p>ระบบจัดการโครงการ SDGs — มหาวิทยาลัยขอนแก่น</p>
    </div>
    <div class="dash-user">
      <div class="dash-user-info">
        <div class="dash-user-name" id="userFaculty">-</div>
        <div class="dash-user-role" id="userRole">-</div>
      </div>
      <button class="dash-logout" onclick="logout()">🚪 ออกจากระบบ</button>
    </div>
  </div>
</div>

<div class="dash-main">
  <div class="dash-stats">
    <div class="dash-stat"><div class="val" id="statTotal">-</div><div class="lbl">โครงการทั้งหมด</div></div>
    <div class="dash-stat"><div class="val" id="statSDGs">-</div><div class="lbl">SDGs ที่ครอบคลุม</div></div>
    <div class="dash-stat"><div class="val" id="statLatest">-</div><div class="lbl">อัปเดตล่าสุด</div></div>
  </div>

  <!-- ══ ADMIN OVERVIEW PANELS ══ -->
  <div class="admin-panels" id="adminPanels" style="display:none;">
    <div class="admin-panel">
      <h3>📊 ภาพรวม SDGs</h3>
      <div id="sdgOverview"></div>
    </div>
    <div class="admin-panel">
      <h3>🏫 จำนวนโครงการต่อคณะ/หน่วยงาน</h3>
      <div id="facultyOverview" style="max-height:320px;overflow-y:auto;"></div>
    </div>
  </div>

  <!-- ══ SEARCH & FILTERS ══ -->
  <div class="filter-panel">
    <div class="filter-row">
      <div class="filter-group" style="flex:2;">
        <label>🔍 ค้นหาชื่อโครงการ</label>
        <input type="text" id="filterSearch" placeholder="พิมพ์ชื่อโครงการ..." oninput="applyFilters()">
      </div>
      <div class="filter-group">
        <label>🏫 คณะ / หน่วยงาน</label>
        <select id="filterFaculty" onchange="applyFilters()"><option value="">ทั้งหมด</option></select>
      </div>
      <div class="filter-group" id="filterOwnerGroup" style="display:none;">
        <label>👤 เจ้าของ (Username)</label>
        <select id="filterOwner" onchange="applyFilters()"><option value="">ทั้งหมด</option></select>
      </div>
      <div class="filter-group" style="flex:0.6;">
        <label>↕️ เรียงตาม</label>
        <select id="filterSort" onchange="applyFilters()">
          <option value="newest">ใหม่สุด</option>
          <option value="oldest">เก่าสุด</option>
          <option value="name-az">ชื่อ ก→ฮ</option>
          <option value="name-za">ชื่อ ฮ→ก</option>
          <option value="activities">กิจกรรมมากสุด</option>
        </select>
      </div>
      <button class="filter-reset" onclick="resetFilters()">✕ ล้างตัวกรอง</button>
    </div>
    <!-- SDG filter -->
    <div style="margin-top:10px;">
      <label style="font-size:10px;font-weight:700;color:var(--kku-gray);text-transform:uppercase;letter-spacing:0.5px;">🌐 กรอง SDGs (คลิกเลือกได้หลายข้อ)</label>
      <div class="filter-sdg-row" id="filterSdgRow"></div>
    </div>
  </div>

  <div class="filter-count" id="filterCount"></div>

  <div class="dash-toolbar">
    <h2>📋 รายการโครงการ</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="admin-log-btn" id="logBtn" style="display:none;" onclick="toggleLogPanel()">📋 ประวัติ Admin</button>
      <button class="dash-add-btn" onclick="addProject()">➕ เพิ่มโครงการใหม่</button>
    </div>
  </div>

  <!-- Admin Log Panel -->
  <div class="log-panel" id="logPanel">
    <h3>📋 ประวัติการดำเนินการของ Admin</h3>
    <div id="logContent"><div class="loading">⏳ กำลังโหลด...</div></div>
    <button class="log-close" onclick="toggleLogPanel()">✕ ปิด</button>
  </div>

  <div class="project-list" id="projectList">
    <div class="loading">⏳ กำลังโหลดข้อมูล...</div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz3GW1VJu64Km4n9rypJGkpVUV67hJTUNVjgd6P4mC_xLfkzTocqQq1fVTcHf-sWgGz/exec';

const sdgColors = {1:'#e5243b',2:'#dda63a',3:'#4c9f38',4:'#c5192d',5:'#ff3a21',6:'#26bde2',
  7:'#fcc30b',8:'#a21942',9:'#fd6925',10:'#dd1367',11:'#fd9d24',12:'#bf8b2e',
  13:'#3f7e44',14:'#0a97d9',15:'#56c02b',16:'#00689d',17:'#19486a'};
const sdgNames = {1:'No Poverty',2:'Zero Hunger',3:'Good Health',4:'Quality Edu',5:'Gender Eq.',6:'Clean Water',7:'Clean Energy',8:'Decent Work',9:'Innovation',10:'Reduce Ineq.',11:'Sustainable Cities',12:'Resp. Consump.',13:'Climate Action',14:'Life Below Water',15:'Life on Land',16:'Peace & Justice',17:'Partnerships'};

let allProjects = [];
let filterSdgs = [];

const user = JSON.parse(sessionStorage.getItem('sdg_user') || 'null');
if (!user) {
  window.location.href = 'index.html';
} else {
  document.getElementById('userFaculty').textContent = user.faculty_name;
  document.getElementById('userRole').textContent = user.role === 'admin' ? '👑 ผู้ดูแลระบบ (เห็นทุกคณะ)' : '👤 ' + user.username;
  if (user.role === 'admin') {
    document.getElementById('logBtn').style.display = 'flex';
    document.getElementById('adminPanels').style.display = 'grid';
    document.getElementById('filterOwnerGroup').style.display = 'block';
  }
  buildSdgFilterButtons();
  loadProjects();
}

// ── SDG Filter Buttons ──
function buildSdgFilterButtons() {
  const row = document.getElementById('filterSdgRow');
  for (let i = 1; i <= 17; i++) {
    const btn = document.createElement('button');
    btn.className = 'filter-sdg-btn';
    btn.style.background = sdgColors[i];
    if (i === 7 || i === 11) btn.style.color = '#333';
    btn.textContent = i;
    btn.dataset.sdg = i;
    btn.onclick = function() {
      const n = parseInt(this.dataset.sdg);
      const idx = filterSdgs.indexOf(n);
      if (idx === -1) { filterSdgs.push(n); this.classList.add('active'); }
      else { filterSdgs.splice(idx, 1); this.classList.remove('active'); }
      applyFilters();
    };
    row.appendChild(btn);
  }
}

// ── Load Projects ──
async function loadProjects() {
  try {
    const url = API_URL + '?action=getProjects&username=' + encodeURIComponent(user.username);
    const res = await fetch(url);
    const result = await res.json();
    if (result.status === 'success') {
      allProjects = result.projects;
      buildFilterDropdowns();
      updateStats(allProjects);
      if (user.role === 'admin') {
        renderSdgOverview(allProjects);
        renderFacultyOverview(allProjects);
      }
      applyFilters();
    } else {
      document.getElementById('projectList').innerHTML = '<div class="empty-state"><span class="emoji">❌</span><p>' + result.message + '</p></div>';
    }
  } catch (error) {
    document.getElementById('projectList').innerHTML = '<div class="empty-state"><span class="emoji">❌</span><p>โหลดข้อมูลไม่สำเร็จ: ' + error.message + '</p></div>';
  }
}

// ── Build Filter Dropdowns ──
function buildFilterDropdowns() {
  // Faculty dropdown
  const faculties = [...new Set(allProjects.map(p => p.kku_unit).filter(Boolean))].sort();
  const fSel = document.getElementById('filterFaculty');
  fSel.innerHTML = '<option value="">ทั้งหมด</option>' + faculties.map(f => '<option value="' + f + '">' + f + '</option>').join('');

  // Owner dropdown (admin only)
  if (user.role === 'admin') {
    const owners = [...new Set(allProjects.map(p => p.username).filter(Boolean))].sort();
    const oSel = document.getElementById('filterOwner');
    oSel.innerHTML = '<option value="">ทั้งหมด</option>' + owners.map(o => '<option value="' + o + '">' + o + '</option>').join('');
  }
}

// ── Apply Filters ──
function applyFilters() {
  const search = document.getElementById('filterSearch').value.trim().toLowerCase();
  const faculty = document.getElementById('filterFaculty').value;
  const owner = document.getElementById('filterOwner') ? document.getElementById('filterOwner').value : '';
  const sort = document.getElementById('filterSort').value;

  let filtered = allProjects.filter(p => {
    // Search
    if (search && !(p.project_title || '').toLowerCase().includes(search) && !(p.sdg_id || '').toLowerCase().includes(search)) return false;
    // Faculty
    if (faculty && (p.kku_unit || '') !== faculty) return false;
    // Owner
    if (owner && (p.username || '') !== owner) return false;
    // SDGs
    if (filterSdgs.length > 0) {
      const pSdgs = p.sdgs ? p.sdgs.toString().split(',').map(s => parseInt(s.trim())).filter(n => n > 0) : [];
      if (!filterSdgs.some(s => pSdgs.includes(s))) return false;
    }
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    switch (sort) {
      case 'newest': return 0; // already in order, will reverse below
      case 'oldest': return 0;
      case 'name-az': return (a.project_title || '').localeCompare(b.project_title || '', 'th');
      case 'name-za': return (b.project_title || '').localeCompare(a.project_title || '', 'th');
      case 'activities': return (parseInt(b.activity_count) || 0) - (parseInt(a.activity_count) || 0);
      default: return 0;
    }
  });

  if (sort === 'newest') filtered.reverse();
  // oldest = original order (already chronological)

  // Filter count
  const hasFilter = search || faculty || owner || filterSdgs.length > 0;
  document.getElementById('filterCount').innerHTML = hasFilter
    ? 'แสดง <strong>' + filtered.length + '</strong> จาก ' + allProjects.length + ' โครงการ'
    : '';

  renderProjectCards(filtered);
}

function resetFilters() {
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterFaculty').value = '';
  if (document.getElementById('filterOwner')) document.getElementById('filterOwner').value = '';
  document.getElementById('filterSort').value = 'newest';
  filterSdgs = [];
  document.querySelectorAll('.filter-sdg-btn').forEach(b => b.classList.remove('active'));
  applyFilters();
}

// ── Stats ──
function updateStats(projects) {
  document.getElementById('statTotal').textContent = projects.length;
  const allSdgSet = new Set();
  projects.forEach(p => {
    if (p.sdgs) p.sdgs.toString().split(',').forEach(s => { if (s.trim()) allSdgSet.add(s.trim()); });
  });
  document.getElementById('statSDGs').textContent = allSdgSet.size;
  document.getElementById('statLatest').textContent = projects.length > 0 ? projects[projects.length - 1].timestamp : '-';
}

// ── SDG Overview (admin) ──
function renderSdgOverview(projects) {
  const counts = {};
  for (let i = 1; i <= 17; i++) counts[i] = 0;
  projects.forEach(p => {
    if (p.sdgs) p.sdgs.toString().split(',').forEach(s => { const n = parseInt(s.trim()); if (n >= 1 && n <= 17) counts[n]++; });
  });
  const max = Math.max(...Object.values(counts), 1);
  let html = '';
  for (let i = 1; i <= 17; i++) {
    const pct = (counts[i] / max * 100).toFixed(0);
    html += '<div class="sdg-bar-row"><div class="sdg-bar-label" style="background:' + sdgColors[i] + '">' + i + '</div><div class="sdg-bar-track"><div class="sdg-bar-fill" style="width:' + pct + '%;background:' + sdgColors[i] + '"></div></div><div class="sdg-bar-count">' + counts[i] + '</div></div>';
  }
  document.getElementById('sdgOverview').innerHTML = html;
}

// ── Faculty Overview (admin) ──
function renderFacultyOverview(projects) {
  const counts = {};
  projects.forEach(p => {
    const f = p.kku_unit || 'ไม่ระบุ';
    counts[f] = (counts[f] || 0) + 1;
  });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  let html = '';
  sorted.forEach(([name, count]) => {
    html += '<div class="faculty-row"><div class="faculty-name">' + name + '</div><div class="faculty-count">' + count + '</div></div>';
  });
  if (sorted.length === 0) html = '<div style="text-align:center;padding:20px;color:var(--kku-gray);">ยังไม่มีข้อมูล</div>';
  document.getElementById('facultyOverview').innerHTML = html;
}

// ── Render Project Cards ──
function renderProjectCards(projects) {
  const listDiv = document.getElementById('projectList');
  if (projects.length === 0) {
    listDiv.innerHTML = '<div class="empty-state"><span class="emoji">📭</span><p>ไม่พบโครงการที่ตรงกับตัวกรอง</p></div>';
    return;
  }
  listDiv.innerHTML = projects.map(p => {
    const sdgTags = p.sdgs ? p.sdgs.toString().split(',').filter(s => s.trim()).map(s => {
      const n = parseInt(s.trim());
      return '<span class="project-sdg-tag" style="background:' + (sdgColors[n] || '#999') + '">' + n + '</span>';
    }).join('') : '';
    const ownerTag = user.role === 'admin' && p.username ? ' <span style="font-size:10px;color:var(--kku-gray);">(' + p.username + ')</span>' : '';
    return '<div class="project-card">' +
      '<div class="project-card-header"><span class="project-id">' + p.sdg_id + '</span><span class="project-date">' + p.timestamp + '</span></div>' +
      '<div class="project-title">' + (p.project_title || 'ไม่ระบุชื่อ') + ownerTag + '</div>' +
      '<div class="project-meta">🏫 ' + (p.kku_unit || '-') + ' · 👤 ' + (p.lead_person || '-') + ' · 📊 กิจกรรม ' + (p.activity_count || 0) + ' รายการ</div>' +
      (sdgTags ? '<div class="project-sdgs">' + sdgTags + '</div>' : '') +
      '<div class="project-actions">' +
      '<button class="btn-view" onclick="viewProject(\'' + p.sdg_id + '\')">📄 ดู Story Card</button>' +
      '<button class="btn-edit" onclick="editProject(\'' + p.sdg_id + '\')">✏️ แก้ไข</button>' +
      '<button class="btn-delete" onclick="deleteProject(\'' + p.sdg_id + '\',\'' + (p.project_title || '').replace(/'/g, "\\'") + '\')">🗑️ ลบ</button>' +
      '</div></div>';
  }).join('');
}

function addProject() { window.location.href = 'index-sdgs.html'; }
function editProject(sdgId) {
  if (user.role === 'admin') sendAdminLog(sdgId, '', 'เข้าแก้ไขโครงการ', 'เปิดหน้าแก้ไข ' + sdgId);
  window.location.href = 'index-sdgs.html?edit=' + sdgId;
}
function viewProject(sdgId) {
  if (user.role === 'admin') sendAdminLog(sdgId, '', 'ดูโครงการ', 'เปิดดู Story Card ' + sdgId);
  window.location.href = 'index-sdgs.html?view=' + sdgId;
}
async function deleteProject(sdgId, title) {
  if (!confirm('ต้องการลบโครงการ "' + title + '" (' + sdgId + ')?\n\nลบแล้วไม่สามารถกู้คืนได้')) return;
  try {
    const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify({action:'delete',sdg_id:sdgId,username:user.username}), redirect:'follow' });
    const result = await res.json();
    if (result.status === 'success') { alert('✅ ' + result.message); loadProjects(); }
    else { alert('❌ ' + result.message); }
  } catch (error) { alert('❌ ' + error.message); }
}

// ── Admin Log ──
function sendAdminLog(sdgId, projectTitle, logAction, detail) {
  fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify({action:'logAction',username:user.username,sdg_id:sdgId,project_title:projectTitle,log_action:logAction,detail:detail}), redirect:'follow' }).catch(e => console.log('Log error:', e));
}
async function toggleLogPanel() {
  const panel = document.getElementById('logPanel');
  if (panel.classList.contains('show')) { panel.classList.remove('show'); return; }
  panel.classList.add('show');
  document.getElementById('logContent').innerHTML = '<div class="loading">⏳ กำลังโหลด...</div>';
  try {
    const res = await fetch(API_URL + '?action=getLogs');
    const result = await res.json();
    if (result.status === 'success' && result.logs.length > 0) {
      const ac = {'ดูโครงการ':'log-action-view','เข้าแก้ไขโครงการ':'log-action-edit','แก้ไขโครงการ':'log-action-edit','บันทึกโครงการใหม่':'log-action-new','ลบโครงการ':'log-action-delete'};
      let html = '<table class="log-table"><tr><th>เวลา</th><th>Admin</th><th>โครงการ</th><th>การดำเนินการ</th><th>รายละเอียด</th></tr>';
      result.logs.forEach(l => { html += '<tr><td>'+l.timestamp+'</td><td><strong>'+l.admin_username+'</strong><br><span style="font-size:10px;color:var(--kku-gray)">'+l.admin_name+'</span></td><td>'+(l.sdg_id||'-')+'</td><td><span class="log-action '+(ac[l.action]||'log-action-view')+'">'+l.action+'</span></td><td>'+(l.detail||'-')+'</td></tr>'; });
      html += '</table>';
      document.getElementById('logContent').innerHTML = html;
    } else { document.getElementById('logContent').innerHTML = '<div style="text-align:center;padding:20px;color:var(--kku-gray);">ยังไม่มีประวัติ</div>'; }
  } catch (error) { document.getElementById('logContent').innerHTML = '<div style="color:#e74c3c;padding:10px;">โหลดไม่สำเร็จ: ' + error.message + '</div>'; }
}
function logout() { sessionStorage.removeItem('sdg_user'); window.location.href = 'index.html'; }
</script>
